<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modal</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      }

      body {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background: #f2f2f2;
      }

       .botao {
        background: #2536eb;
        color: white;
        text-decoration: none;
        padding: 12px 24px;
        border-radius: 8px;
        transition: .3s;
       }

        .botao:hover {
            background: #1d4ed8;
        }

        .modal {
            position: 0;
            inset: 0;
            background: rgba(0, 0, 0, .6);
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            visibility: hidden;
            transition: .3s;
        }

        .modal:target {
            opacity: 1;
            visibility: visible;
        }

        .modal_conteudo {
            position: relative;
            width: 400px;
            max-width: 90%;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, .3);
            animation: aparecer .3s;
        }

        .fechar {
            position: absolute;
            top: 15px;
            right: 20px;
            text-decoration: none;
            color: #555;
            font-size: 28px;
            font-weight: bold;
        }

        .fechar:hover {
            color: red;
        }

        .modal_conteudo button{
            margin-top: 20px;
            width: 100%;
            border: none;
            border-radius: 8px;
            background: #2536eb;
            color: white;
            cursor: pointer;
        }

        .modal_conteudo button:hover {
            background: #1d4ed8;
        }

        @keyframes aparecer {
            from {
                transform: translateY(-40px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
    </style>
</head>

<body>
   <a href="#modal" class="botao">Abrir Modal</a>
   <div id="modal" class="modal">
    <div class="counteudo-modal">
        <a href="#" class="fechar">Fechar Modal</a>
        <h2>Coisas</h2>
        <p>e mais coisa e muitas mais coisa e varias coisa e bastante Coisas</p>
        <button>Confirmar</button>
    </div>
   </div>
</body>

</html>
